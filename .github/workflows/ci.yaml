name: 🔍 CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  DOCKER_BUILDKIT: 1
  UV_VERSION: "0.9.x"

jobs:
  # ===========================================================================
  # 🎨 Code Quality Checks
  # ===========================================================================
  lint:
    name: 🎨 Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Ruff via uv
        run: uv pip install ruff

      - name: 🔍 Run Ruff linter
        run: |
          echo "::group::🔍 Running Ruff linter"
          uv run ruff check src/ tests/ scripts/ --output-format=github
          echo "::endgroup::"

      - name: 💅 Run Ruff formatter check
        run: |
          echo "::group::💅 Checking code formatting"
          uv run ruff format --check src/ tests/ scripts/
          echo "::endgroup::"

      - name: 📝 Generate lint summary
        if: always()
        run: |
          echo "## 🎨 Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All lint checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Lint checks failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # 🧪 Test Suite
  # ===========================================================================
  test:
    name: 🧪 Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]
        include:
          - test-type: unit
            marker: "not integration"
            timeout: 300
          - test-type: integration
            marker: "integration"
            timeout: 600

    services:
      # 🦫 Zookeeper for Kafka
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
        options: >-
          --health-cmd "nc -z localhost 2181"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 📨 Kafka Message Broker
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Sync dependencies
        run: |
          echo "::group::📦 Syncing dependencies with uv"
          uv sync --frozen --extra dev
          echo "::ingroup::"

      - name: 🧪 Run ${{ matrix.test-type }} tests
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_INPUT_TOPIC: test-raw-logs
          KAFKA_OUTPUT_TOPIC: test-filtered-logs
          KAFKA_CONSUMER_GROUP: test-group-${{ github.run_id }}
          PYTEST_CURRENT_TEST: 1
        run: |
          echo "::group::🧪 Running ${{ matrix.test-type }} tests"
          if [ "${{ matrix.test-type }}" == "unit" ]; then
            uv run pytest tests/ -v \
              --cov=src \
              --cov-report=term-missing \
              --cov-report=xml \
              --cov-report=html \
              -m "${{ matrix.marker }}" \
              --timeout=${{ matrix.timeout }} \
              --tb=short \
              -x
          else
            uv run pytest tests/ -v \
              -m "${{ matrix.marker }}" \
              --timeout=${{ matrix.timeout }} \
              --tb=short
          fi
          echo "::ingroup::"

      - name: 📊 Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          name: ${{ github.job }}-${{ matrix.test-type }}
          verbose: true

      - name: 📈 Upload coverage artifact
        if: matrix.test-type == 'unit' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

      - name: 📝 Generate test summary
        if: always()
        run: |
          echo "## 🧪 Test Results (${{ matrix.test-type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ ${{ matrix.test-type }} tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ${{ matrix.test-type }} tests failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # 🔒 Security Scanning
  # ===========================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🛡️ Install security tools
        run: uv pip install bandit safety

      - name: 🔍 Run Bandit security scanner
        run: |
          echo "::group::🔍 Running Bandit security scan"
          uv run bandit -r src/ -f json -o bandit-results.json || true
          echo "::ingroup::"

      - name: ☁️ Upload Bandit results to SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: bandit-results.json

      - name: 🛡️ Run Safety check
        run: |
          echo "::group::🛡️ Running Safety dependency check"
          uv run safety check --json -o safety-results.json || true
          echo "::ingroup::"

      - name: 📊 Generate security summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Security scans passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Security scans found issues" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📁 Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            bandit-results.json
            safety-results.json
          retention-days: 30

  # ===========================================================================
  # 🐳 Docker Build
  # ===========================================================================
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Sync dependencies
        run: uv sync --frozen --no-dev

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-log-filter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Verify Docker image
        run: |
          echo "::group::✅ Verifying Docker image"
          docker run --rm ai-log-filter:latest python -c "from src.main import main; print('Docker import successful')"
          echo "::ingroup::"

      - name: 📝 Generate build summary
        if: always()
        run: |
          echo "## 🐳 Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Docker image built successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Docker build failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # 🤖 Model Validation
  # ===========================================================================
  model-validation:
    name: 🤖 Model Validation
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Sync dependencies
        run: uv sync --frozen --extra dev

      - name: 🤖 Validate model artifacts
        run: |
          echo "::group::🤖 Validating model artifacts"
          python scripts/validate_models.py
          echo "::ingroup::"

      - name: 📊 Generate model validation summary
        if: always()
        run: |
          echo "## 🤖 Model Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All models validated successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Model validation failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # 🔥 Chaos Engineering Tests
  # ===========================================================================
  chaos:
    name: 🔥 Chaos Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Sync dependencies
        run: uv sync --frozen --extra dev

      - name: 🔥 Run chaos tests
        run: |
          echo "::group::🔥 Running chaos engineering tests"
          uv run python scripts/chaos_test.py --quick
          echo "::endgroup::"

      - name: 📊 Generate chaos test summary
        if: always()
        run: |
          echo "## 🔥 Chaos Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests: fail-open, circuit breaker, high latency, memory pressure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All chaos tests passed! System is resilient." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Chaos tests found weaknesses" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # 📊 Quality Gate
  # ===========================================================================
  quality-gate:
    name: 📊 Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan, build, model-validation]
    if: always()
    steps:
      - name: 📊 Check quality gate
        run: |
          echo "## 📊 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Models | ${{ needs.model-validation.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Quality gate failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ Quality gate passed!" >> $GITHUB_STEP_SUMMARY
