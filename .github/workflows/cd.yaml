name: 🚀 CD

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: "🚀 Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: "3.13"
  DOCKER_BUILDKIT: 1
  UV_VERSION: "0.9.x"

jobs:
  # ===========================================================================
  # ✅ Pre-deployment Validation
  # ===========================================================================
  validate:
    name: ✅ Pre-deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Sync dependencies
        run: uv sync --frozen --extra dev

      - name: 🏷️ Get version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          print(f"version={data['project']['version']}")
          PY

      - name: 🤖 Validate models
        run: python scripts/validate_models.py

      - name: 🧪 Run smoke tests
        run: |
          echo "::group::🧪 Running smoke tests"
          python -c "
          from src.models.safe_ensemble import SafeEnsembleClassifier
          print('✅ Model loading test passed')
          from src.integration import KafkaIntegration, QRadarIntegration
          print('✅ Integration imports passed')
          "
          echo "::ingroup::"

      - name: 📊 Generate validation summary
        run: |
          echo "## ✅ Pre-deployment Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 🐳 Build & Push Docker
  # ===========================================================================
  build:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/ai-log-filter
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=${{ needs.validate.outputs.version }}

      - name: 🐳 Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📦 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom

      - name: 🔐 Sign container image
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.2'

      - name: ✍️ Sign the image
        if: github.event_name == 'release'
        env:
          COSIGN_EXPERIMENTAL: true
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/ai-log-filter@${{ steps.build.outputs.digest }}

      - name: 📋 Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

      - name: 📊 Generate build summary
        run: |
          echo "## 🐳 Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker image built and pushed!" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 🏗️ Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: 🏗️ Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment: staging
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add kubectl/helm deployment commands here
          echo "✅ Deployment to staging complete"

      - name: 🧪 Run staging smoke tests
        run: |
          echo "🧪 Running staging smoke tests..."
          # Add health check commands
          curl -f http://staging-ai-log-filter.example.com/health || echo "⚠️ Health check endpoint not available"

      - name: 📊 Generate staging summary
        run: |
          echo "## 🏗️ Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to staging successfully!" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 🏭 Deploy to Production
  # ===========================================================================
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.event_name == 'release'
    environment: production
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📝 Create deployment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createPullRequest({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Deploy version ${{ needs.validate.outputs.version }} to production",
              head: "release/${{ needs.validate.outputs.version }}",
              base: "main",
              body: "🚀 Production deployment for version ${{ needs.validate.outputs.version }}"
            })

      - name: 🏭 Deploy to production
        run: |
          echo "🏭 Deploying to production environment..."
          # Add kubectl/helm deployment commands here
          echo "✅ Production deployment complete"

      - name: 🧪 Run production smoke tests
        run: |
          echo "🧪 Running production smoke tests..."
          # Add health check commands
          curl -f http://ai-log-filter.example.com/health || echo "⚠️ Health check endpoint not available"

      - name: 📢 Notify deployment
        run: |
          echo "📢 Deployment notification sent"
          # Add Slack/Teams notification

      - name: 📊 Generate production summary
        run: |
          echo "## 🏭 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to production!" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 🔄 Model Rollback Readiness Check
  # ===========================================================================
  model-rollback-check:
    name: 🔄 Check Model Rollback Readiness
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📂 Check model versions
        run: |
          echo "📂 Available model versions:"
          ls -la models/

      - name: ✅ Validate rollback procedure
        run: |
          echo "✅ Validating rollback procedure..."
          # Test model loading from previous versions

      - name: 📊 Generate rollback summary
        run: |
          echo "## 🔄 Model Rollback Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Rollback readiness validated!" >> $GITHUB_STEP_SUMMARY
